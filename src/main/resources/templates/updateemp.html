<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Employee</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    </head>
<body>
<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Update Employee</h3>
        <form th:action="@{/updateemp/{id}(id=${emp.id})}" method="post">
            <input type="hidden" name="id" th:value="${emp.id}">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" th:value="${emp.name}"required>
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" th:value="${emp.department}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Salary</label>
                <input type="number" name="salary" class="form-control" th:value="${emp.salary}"required>
            </div>
            <button type="submit" class="btn btn-success w-100">
                Update Employee
            </button>
        </form>
        <a href="/emplist" class="btn btn-secondary mt-3 w-100">
            Back to List
        </a>

    </div>
</div>

</body>
</html>
